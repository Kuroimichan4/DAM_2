<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "C:/xampp/htdocs/miweb"

    <Directory "C:/xampp/htdocs/miweb">
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog "logs/miweb_error.log"
    CustomLog "logs/miweb_access.log" common
</VirtualHost>