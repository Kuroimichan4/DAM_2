            </ul>
            <ol>
                <li>dormir</li>

            <table border="1">

                    <tr>

        <section id="proyectos">

        </section>

        <section id="desplegable">
            <label for="joder">Formas de tocar los huevos: </label>
            <select id="joder">
                <option value="">Selecciona un tipo</option>
                <option value="cosquillas">Cosquillas</option>
                <option value="patada">Patada en la espunilla</option>
                <option value="dinero">Pedir dinero</option>
            </select>

        </section>

        <section id="buttons">
            <fieldset> <!-- Esto solo crea un recuadro para los checboxes para agruparlos visualmente -->
                <legend>Habilidades</legend> <!-- Solo es el titulo del recuadro -->
        
                <label><input type="checkbox" name="habilidades" value="molestar">Molestar</label>
                <label><input type="checkbox" name="habilidades" value="humor">Humor negro</label>
                <label><input type="checkbox" name="habilidades" value="vaguear">vaguear</label>
        </section>

        <section id="contacto">
            <h2>Contacto</h2>
            <form id="formNom">
                <label for="nombre">Nombre: </label><!-- label Solo es una etiqueta descriptiva  y el for es para indicar a qué id pertenece-->
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Papadopoulos" required> <!-- el required es para indicar campo obligatorio -->

                <label for="email">Email: </label>
                <input type="text" id="email" name="email" placeholder="Ej: Papadopoulos@gmail.com" required>
                <label for="mensaje">Mensaje: </label>
                <textarea id="mensaje" name="mensaje" placeholder="Ej: Me cago en tu puta madre" rows="5"> <!-- el rows es para indicar cuanto va a medir de alto (no es obligatorio) -->

                <button type="submit">Enviar</button>

            </form>

        
        </section>
